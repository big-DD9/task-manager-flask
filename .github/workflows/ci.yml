name: CI/CD

# Runs on every push and every pull request targeting main. PRs only get
# the test job (we don't want to publish an image from unmerged code) -
# main gets both test and, if tests pass, a Docker image build+push.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # Caches pip downloads between runs, keyed off requirements-dev.txt -
          # if dependencies haven't changed, this step is near-instant instead
          # of re-downloading every package on every single push.
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/ -v

  build-and-push:
    # Only runs after "test" succeeds, and only on actual pushes to main -
    # not on pull requests, since we don't want to publish images built
    # from code that hasn't been merged yet.
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    # Required so this job is allowed to push to GitHub Container Registry.
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # GITHUB_TOKEN is provided automatically by GitHub Actions for
          # every run - no separate secret or account needed to push to
          # ghcr.io, only to a separate registry like Docker Hub.
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Two tags: "latest" always points at the newest main build,
          # and one tagged with the exact commit SHA - useful later for
          # deploying a specific, known-good version rather than
          # whatever "latest" happens to be at deploy time.
          tags: |
            ghcr.io/${{ github.repository_owner }}/task-manager-flask:latest
            ghcr.io/${{ github.repository_owner }}/task-manager-flask:${{ github.sha }}
          # Reuses layers cached from previous builds where possible -
          # same caching benefit locally as we get from the Dockerfile's
          # own layer ordering, just applied across CI runs too.
          cache-from: type=gha
          cache-to: type=gha,mode=max
